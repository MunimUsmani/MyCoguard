[phases.setup]
nixPkgs = ["...", "nodejs_20", "python311", "python311Packages.pip"]
nixLibs = ["...", "gcc-unwrapped"]

[phases.install]
cmds = [
  "cd backend && npm install",
  "pip install --no-cache-dir --break-system-packages -r ai/requirements.txt"
]

[phases.start]
cmd = "cd backend && npm start"